<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>SplitEasy — Econome (Jars)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pages.css">
<style>
  :root{
    --bg:#f4f4f7;
    --surface:#ffffff;
    --ink:#0b0f1a;
    --ink-2:#3b4356;
    --ink-3:#6b7280;
    --ink-4:#9aa1ad;
    --line:#e8e9ee;
    --line-2:#eef0f4;
    --primary:#5b4ef0;
    --primary-2:#4a3ee8;
    --primary-soft:#eeecff;
    --success:#10b981;
    --success-soft:#dcfce7;
    --warn:#f59e0b;
    --warn-soft:#fef3c7;
    --rose:#f43f5e;
    --rose-soft:#ffe4e6;
    --amber:#f97316;
    --teal:#14b8a6;
    --indigo:#6366f1;
    --sky:#0ea5e9;
    --pink:#ec4899;
    --emerald:#059669;
    --shadow-sm:0 1px 2px rgba(11,15,26,.04);
    --shadow:0 1px 2px rgba(11,15,26,.04), 0 4px 16px rgba(11,15,26,.04);
    --shadow-lg:0 12px 40px rgba(11,15,26,.10), 0 2px 8px rgba(11,15,26,.04);
    --radius:14px;
    --radius-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Geist","Geist Fallback",system-ui,-apple-system,sans-serif;
    font-feature-settings:"cv11","ss01","ss03";
    -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.45;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-0.01em}
  .mono{font-family:"Geist Mono",ui-monospace,Menlo,monospace}

  /* ─── shell ─── */
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  .sidebar{background:#0b0f1a;color:#e6e8ee;padding:22px 16px;display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px}
  .brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#7a6fff,#4a3ee8);display:grid;place-items:center;color:white;font-weight:700;font-size:17px;box-shadow:0 4px 14px rgba(91,78,240,.5)}
  .brand-name{font-weight:600;font-size:16.5px;letter-spacing:-0.01em}
  .brand-name em{font-style:normal;color:#a8a3ff;font-weight:500}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:#9ea4b2;font-size:13.5px;font-weight:500;cursor:pointer;transition:.15s}
  .nav-item:hover{background:rgba(255,255,255,.04);color:#e6e8ee}
  .nav-item.active{background:linear-gradient(135deg,rgba(91,78,240,.18),rgba(91,78,240,.06));color:#fff;box-shadow:inset 0 0 0 1px rgba(122,111,255,.25)}
  .nav-item svg{flex-shrink:0;width:17px;height:17px;stroke-width:1.7}
  .nav-spacer{flex:1}
  .nav-section{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:#5b6273;padding:14px 12px 6px;font-weight:600}
  .premium{margin-top:8px;background:linear-gradient(180deg,#161b29,#0e1320);border:1px solid #1d2336;border-radius:12px;padding:14px;text-align:center}
  .premium-crown{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#fbbf24,#f59e0b);margin:0 auto 8px;display:grid;place-items:center;color:#3a2c00;font-size:18px}
  .premium-title{font-weight:600;font-size:13.5px}
  .premium-sub{font-size:11.5px;color:#9aa1b3;margin:4px 0 10px}
  .btn-premium{width:100%;background:var(--primary);color:white;border:0;padding:8px 12px;border-radius:8px;font-size:12.5px;font-weight:600}

  /* topbar */
  .main{display:flex;flex-direction:column;min-width:0}
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 36px;border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:30}
  .search{flex:1;max-width:520px;position:relative}
  .search input{width:100%;background:#f4f4f7;border:1px solid transparent;border-radius:10px;padding:9px 14px 9px 38px;font-size:13.5px;color:var(--ink);outline:none;transition:.15s}
  .search input:focus{background:white;border-color:var(--line);box-shadow:0 0 0 3px var(--primary-soft)}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-4)}
  .topbar-spacer{flex:1}
  .icon-btn{position:relative;width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:white;display:grid;place-items:center;color:var(--ink-2)}
  .icon-btn:hover{background:#f9f9fb}
  .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--rose);box-shadow:0 0 0 2px white}
  .profile{display:flex;align-items:center;gap:9px;padding:4px 12px 4px 4px;border-radius:30px;border:1px solid var(--line);background:white;cursor:pointer}
  .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ec4899);display:grid;place-items:center;color:white;font-weight:600;font-size:12px}
  .profile-name{font-size:13px;font-weight:500}

  /* page */
  .page{padding:28px 36px 80px;max-width:1440px;width:100%}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:22px}
  .page-head h1{font-size:26px;font-weight:600;letter-spacing:-0.02em;margin:0 0 4px}
  .page-head p{margin:0;color:var(--ink-3);font-size:13.5px}
  .page-actions{display:flex;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;border:1px solid transparent;transition:.15s;white-space:nowrap}
  .btn svg{width:15px;height:15px;stroke-width:2}
  .btn-primary{background:var(--primary);color:white;box-shadow:0 1px 0 rgba(255,255,255,.2) inset,0 4px 12px rgba(91,78,240,.3)}
  .btn-primary:hover{background:var(--primary-2)}
  .btn-secondary{background:white;color:var(--ink);border-color:var(--line)}
  .btn-secondary:hover{background:#fafafa;border-color:#dcdee5}
  .btn-ghost{background:transparent;color:var(--ink-2)}
  .btn-ghost:hover{background:#f1f2f6}

  /* cards */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:24px}
  .stat{padding:18px 20px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
  .stat-h{display:flex;align-items:center;justify-content:space-between;color:var(--ink-3);font-size:13px;font-weight:500}
  .stat .v{font-size:26px;font-weight:600;letter-spacing:-0.02em;color:var(--success);margin-top:2px}
  .stat-sub{font-size:12.5px;color:var(--ink-3);display:flex;align-items:center;gap:6px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;background:#f4f4f7;color:var(--ink-2);font-size:12px;font-weight:500;border:1px solid var(--line)}
  .pill svg{width:12px;height:12px}
  .pill-success{background:var(--success-soft);color:#065f46;border-color:transparent}

  /* sections */
  .section{margin-top:22px}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .section-head h2{font-size:18px;font-weight:600;letter-spacing:-0.01em;margin:0}
  .section-head .meta{font-size:13px;color:var(--ink-3)}
  .section-head .meta b{color:var(--ink);font-weight:600}

  /* jar cards (default viz) */
  .jar-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px}
  .jar-card{padding:14px 14px 16px;display:flex;flex-direction:column;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:.15s;position:relative}
  .jar-card:hover{border-color:#d6d9e2;box-shadow:var(--shadow);transform:translateY(-1px)}
  .jar-card-h{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .jar-icon{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .jar-name{font-size:12.5px;font-weight:600;color:var(--ink);line-height:1.2}
  .jar-pct{font-size:11.5px;font-weight:600;color:var(--ink-3);background:#f4f4f7;padding:2px 7px;border-radius:6px}
  .jar-amount{font-size:18px;font-weight:600;letter-spacing:-0.02em;color:var(--success);line-height:1}
  .jar-target{font-size:11.5px;color:var(--ink-3)}
  .jar-bar{height:6px;background:#eef0f4;border-radius:99px;overflow:hidden;position:relative}
  .jar-bar-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .jar-foot{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding-top:8px;border-top:1px solid var(--line-2)}
  .jar-foot div{display:flex;flex-direction:column;gap:1px}
  .jar-foot .lbl{font-size:10.5px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  .jar-foot .val{font-size:12.5px;font-weight:500;color:var(--ink-2)}
  .jar-progress-label{font-size:10.5px;color:var(--ink-4);font-weight:600;position:absolute;right:0;top:-15px}
  .jar-bar-wrap{position:relative;padding-top:14px}

  /* lower row */
  .lower{display:grid;grid-template-columns:1.45fr 1fr;gap:18px;margin-top:24px}

  /* transactions */
  .tx-card{padding:18px 20px 8px}
  .tx-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .tx-head h3{margin:0;font-size:15.5px;font-weight:600}
  .tx-link{font-size:12.5px;color:var(--primary);font-weight:600;background:none;border:0;padding:4px 8px;border-radius:6px}
  .tx-link:hover{background:var(--primary-soft)}
  table.tx{width:100%;border-collapse:collapse}
  .tx th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);font-weight:600;text-align:left;padding:10px 8px;border-bottom:1px solid var(--line-2)}
  .tx td{padding:13px 8px;border-bottom:1px solid var(--line-2);font-size:13px;color:var(--ink-2)}
  .tx tr:last-child td{border-bottom:0}
  .tx td:first-child,.tx th:first-child{padding-left:0}
  .tx td:last-child,.tx th:last-child{padding-right:0;text-align:right}
  .tx-jar{display:inline-flex;align-items:center;gap:6px;font-weight:500;color:var(--ink)}
  .tx-jar .dotc{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .tx-type{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11.5px;font-weight:600}
  .tx-type.expense{background:#fff1f2;color:#be123c}
  .tx-type.income{background:var(--success-soft);color:#047857}
  .tx-amount{font-weight:600;font-variant-numeric:tabular-nums}
  .tx-amount.neg{color:#be123c}
  .tx-amount.pos{color:var(--success)}
  .tx-empty{padding:42px 0;text-align:center;color:var(--ink-3)}
  .tx-empty svg{margin-bottom:8px;color:var(--ink-4)}

  /* donut chart card */
  .donut-card{padding:18px 20px}
  .donut-card h3{margin:0 0 8px;font-size:15.5px;font-weight:600}
  .donut-wrap{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center}
  .donut{position:relative;width:170px;height:170px}
  .donut svg{width:100%;height:100%;transform:rotate(-90deg)}
  .donut-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .donut-center .v{font-size:18px;font-weight:600;letter-spacing:-0.02em}
  .donut-center .l{font-size:11px;color:var(--ink-3);margin-top:2px}
  .legend{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--ink-2)}
  .legend-row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px}
  .legend-row .dotc{width:9px;height:9px;border-radius:3px;flex-shrink:0}
  .legend-name{font-weight:500}
  .legend-amt{font-variant-numeric:tabular-nums;font-weight:500;color:var(--ink-2)}
  .donut-foot{font-size:11.5px;color:var(--ink-4);text-align:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--line-2)}

  /* health donut (smaller) */
  .health-wrap{display:flex;align-items:center;gap:14px}
  .health-donut{position:relative;width:56px;height:56px;flex-shrink:0}
  .health-donut svg{transform:rotate(-90deg)}
  .health-num{position:absolute;inset:0;display:grid;place-items:center;font-size:13px;font-weight:600}

  /* Total in Jars stack mini */
  .stack-mini{display:flex;flex-direction:column;gap:4px;width:60px}
  .stack-bar{height:8px;border-radius:3px}

  /* Tip banner */
  .tip{margin-top:24px;display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:14px;background:var(--surface);border:1px solid var(--line);box-shadow:var(--shadow-sm)}
  .tip-i{width:36px;height:36px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:grid;place-items:center;flex-shrink:0}
  .tip-text{flex:1;font-size:13px;color:var(--ink-2)}
  .tip-text b{color:var(--ink);font-weight:600}
  .tip-actions{display:flex;gap:8px;align-items:center}
  .tip-x{width:28px;height:28px;border-radius:8px;border:0;background:transparent;color:var(--ink-3);display:grid;place-items:center}
  .tip-x:hover{background:#f1f2f6}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(11,15,26,.42);backdrop-filter:blur(6px);z-index:80;display:grid;place-items:center;animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .modal{background:white;border-radius:18px;box-shadow:var(--shadow-lg);width:min(820px,calc(100vw - 48px));max-height:calc(100vh - 60px);overflow:hidden;display:flex;flex-direction:column;animation:pop .22s cubic-bezier(.2,.8,.2,1)}
  .modal-sm{width:min(480px,calc(100vw - 48px))}
  .modal-h{padding:22px 26px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;border-bottom:1px solid var(--line-2)}
  .modal-h h2{margin:0 0 4px;font-size:20px;font-weight:600;letter-spacing:-0.015em}
  .modal-h p{margin:0;font-size:13px;color:var(--ink-3)}
  .modal-x{width:32px;height:32px;border-radius:9px;border:0;background:transparent;color:var(--ink-3);display:grid;place-items:center}
  .modal-x:hover{background:#f1f2f6;color:var(--ink)}
  .modal-b{padding:18px 26px;overflow-y:auto;flex:1}
  .modal-f{padding:14px 26px 20px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line-2);background:#fafbfc}

  /* strategy modal */
  .alloc-banner{background:#f7f8fb;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:14px}
  .alloc-banner.bad{background:#fff1f2;border-color:#fecaca}
  .alloc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .alloc-row .lbl{font-size:13px;font-weight:500;color:var(--ink-2)}
  .alloc-pct{font-size:14px;font-weight:600;color:var(--success)}
  .alloc-pct.bad{color:var(--rose)}
  .alloc-bar{height:8px;background:#e6e8ee;border-radius:99px;overflow:hidden}
  .alloc-bar-fill{height:100%;background:linear-gradient(90deg,var(--success),#34d399);transition:width .25s}
  .alloc-bar-fill.bad{background:linear-gradient(90deg,var(--rose),#fb7185)}

  .preset-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .preset{padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:white;font-size:12.5px;font-weight:500;color:var(--ink-2);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .preset:hover{border-color:#cfd3dd;background:#fafbfc}
  .preset.active{border-color:var(--primary);background:var(--primary-soft);color:var(--primary);font-weight:600}

  .strat-table{width:100%;border-collapse:collapse}
  .strat-table th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-4);font-weight:600;text-align:left;padding:8px 10px}
  .strat-table td{padding:10px 10px;border-top:1px solid var(--line-2);vertical-align:middle}
  .strat-table td:first-child,.strat-table th:first-child{padding-left:0}
  .strat-table td:last-child,.strat-table th:last-child{padding-right:0;text-align:right}
  .strat-jar{display:flex;align-items:center;gap:10px;min-width:200px}
  .strat-jar .jar-icon{width:34px;height:34px;font-size:16px}
  .strat-jar .nm{font-size:13.5px;font-weight:600;color:var(--ink)}
  .strat-jar .ds{font-size:11.5px;color:var(--ink-3);margin-top:1px}
  .stepper{display:inline-flex;align-items:center;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:white}
  .stepper button{width:28px;height:30px;border:0;background:transparent;color:var(--ink-2);font-size:14px;display:grid;place-items:center}
  .stepper button:hover{background:#f1f2f6;color:var(--ink)}
  .stepper button:disabled{opacity:.4;cursor:default}
  .stepper input{width:50px;height:30px;border:0;text-align:center;font-size:13px;font-weight:600;outline:none;background:transparent;color:var(--ink);font-variant-numeric:tabular-nums}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .slider{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#e6e8ee;border-radius:99px;outline:none;cursor:pointer}
  .slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--primary);border:2px solid white;box-shadow:0 1px 4px rgba(91,78,240,.4);cursor:pointer}
  .slider::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--primary);border:2px solid white;box-shadow:0 1px 4px rgba(91,78,240,.4);cursor:pointer}
  .strat-amt{font-size:13.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
  .strat-note{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;background:var(--primary-soft);border:1px solid #d9d4ff;color:#3a3284;font-size:12.5px;margin-top:14px}
  .strat-note svg{flex-shrink:0;color:var(--primary)}

  /* Log income modal */
  .li-amount{display:flex;align-items:baseline;justify-content:center;gap:6px;padding:24px 0 18px;border-bottom:1px solid var(--line-2);margin-bottom:18px}
  .li-currency{font-size:22px;color:var(--ink-3);font-weight:500}
  .li-input{font-size:48px;font-weight:600;letter-spacing:-0.03em;border:0;outline:none;background:transparent;color:var(--ink);text-align:center;width:300px;font-variant-numeric:tabular-nums}
  .li-input::placeholder{color:#cbd0db}
  .li-quick{display:flex;gap:8px;justify-content:center;margin:10px 0 0}
  .li-quick button{padding:6px 12px;font-size:12.5px;font-weight:500;border-radius:99px;border:1px solid var(--line);background:white;color:var(--ink-2)}
  .li-quick button:hover{border-color:var(--primary);color:var(--primary)}
  .li-preview{padding:14px 16px;background:#f7f8fb;border-radius:12px;margin-bottom:10px}
  .li-preview h4{margin:0 0 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-4);font-weight:600}
  .li-prev-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px}
  .li-prev-row .jar-icon{width:24px;height:24px;font-size:12px}
  .li-prev-row .nm{flex:1;font-weight:500}
  .li-prev-row .pct{color:var(--ink-3);font-size:12px;min-width:36px;text-align:right}
  .li-prev-row .amt{font-weight:600;color:var(--success);font-variant-numeric:tabular-nums;min-width:90px;text-align:right}

  /* Add expense */
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:12px;font-weight:600;color:var(--ink-2)}
  .field input,.field select{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;outline:none;background:white}
  .field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .jar-select{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .jar-pick{padding:10px;border:1px solid var(--line);border-radius:10px;background:white;display:flex;align-items:center;gap:8px;cursor:pointer;text-align:left;transition:.15s}
  .jar-pick:hover{border-color:#cfd3dd}
  .jar-pick.active{border-color:var(--primary);background:var(--primary-soft)}
  .jar-pick .jar-icon{width:26px;height:26px;font-size:13px}
  .jar-pick .nm{font-size:12.5px;font-weight:600;color:var(--ink)}

  /* Celebrate overlay */
  .celebrate{position:fixed;inset:0;z-index:90;display:grid;place-items:center;background:rgba(11,15,26,.5);backdrop-filter:blur(8px);animation:fade .2s}
  .celebrate-card{background:white;border-radius:24px;padding:36px;text-align:center;width:min(440px,calc(100vw - 48px));position:relative;box-shadow:var(--shadow-lg);overflow:hidden;animation:pop .3s cubic-bezier(.2,.8,.2,1)}
  .celebrate-jar{width:84px;height:84px;border-radius:24px;display:grid;place-items:center;margin:0 auto 16px;font-size:42px;position:relative;animation:bounce .6s cubic-bezier(.2,.8,.2,1) .15s both}
  @keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
  .celebrate-card h2{margin:0 0 6px;font-size:24px;font-weight:600;letter-spacing:-0.02em}
  .celebrate-card p{margin:0 0 22px;color:var(--ink-3);font-size:14px}
  .celebrate-amt{font-size:30px;font-weight:600;letter-spacing:-0.02em;color:var(--success);margin-bottom:6px}
  .confetti{position:absolute;width:10px;height:14px;top:0;border-radius:2px;pointer-events:none}
  @keyframes confetti{from{transform:translateY(-20px) rotate(0);opacity:1}to{transform:translateY(440px) rotate(720deg);opacity:0}}

  /* Empty state */
  .empty-state{padding:64px 24px;text-align:center;background:var(--surface);border:1px dashed #d6d9e2;border-radius:18px}
  .empty-illustration{width:120px;height:120px;margin:0 auto 22px;display:grid;place-items:center;background:var(--primary-soft);border-radius:30px}
  .empty-state h3{margin:0 0 8px;font-size:20px;font-weight:600;letter-spacing:-0.015em}
  .empty-state p{margin:0 0 22px;color:var(--ink-3);max-width:380px;margin-left:auto;margin-right:auto}

  /* Stacked bar viz */
  .stacked-viz{padding:18px 22px}
  .stacked-bar{display:flex;height:64px;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  .stacked-seg{display:flex;flex-direction:column;justify-content:space-between;padding:10px 12px;color:white;position:relative;transition:.2s;min-width:40px;cursor:pointer}
  .stacked-seg:hover{filter:brightness(1.1)}
  .stacked-seg .nm{font-size:11px;font-weight:600;opacity:.95;letter-spacing:.01em;line-height:1.1}
  .stacked-seg .pct{font-size:18px;font-weight:600;letter-spacing:-0.02em;line-height:1}
  .stacked-list{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  .sl-row{display:flex;align-items:center;gap:12px;padding:12px;background:#fafbfc;border:1px solid var(--line-2);border-radius:12px}
  .sl-row .jar-icon{width:36px;height:36px;font-size:18px}
  .sl-row .body{flex:1;min-width:0}
  .sl-row .nm{font-size:13px;font-weight:600;line-height:1.2}
  .sl-row .sub{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .sl-row .amt{font-size:14px;font-weight:600;color:var(--success);text-align:right;font-variant-numeric:tabular-nums}
  .sl-row .left{font-size:11px;color:var(--ink-3);text-align:right;margin-top:2px}

  /* Illustrated jars viz */
  .ill-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:24px 18px 18px}
  .ill-cell{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:10px 6px;border-radius:14px;transition:.15s}
  .ill-cell:hover{background:#fafbfc}
  .jar-svg{width:96px;height:120px;position:relative}
  .ill-name{font-size:12px;font-weight:600;text-align:center;line-height:1.2}
  .ill-amt{font-size:14px;font-weight:600;color:var(--success);font-variant-numeric:tabular-nums}
  .ill-pct{font-size:10.5px;color:var(--ink-4);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

  /* Treemap */
  .treemap{padding:18px;display:grid;gap:6px;height:340px;grid-template-columns:1.8fr 1fr 0.85fr;grid-template-rows:1fr 1fr;grid-template-areas:"a b d" "a c e";position:relative}
  .tm-cell{border-radius:12px;padding:14px;color:white;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .tm-cell:hover{transform:scale(1.005);filter:brightness(1.08)}
  .tm-cell .top{display:flex;align-items:flex-start;justify-content:space-between}
  .tm-cell .nm{font-size:13px;font-weight:600;opacity:.95}
  .tm-cell .pct{font-size:11px;font-weight:600;opacity:.85;background:rgba(255,255,255,.15);padding:2px 7px;border-radius:6px}
  .tm-cell .v{font-size:24px;font-weight:600;letter-spacing:-0.02em}
  .tm-cell .sub{font-size:11px;opacity:.85}

  /* Goal Completed badge in card */
  .goal-badge{position:absolute;top:10px;right:10px;background:var(--success);color:white;font-size:10px;font-weight:600;padding:3px 8px;border-radius:99px;display:flex;align-items:center;gap:4px;animation:pop .3s}
  .goal-badge svg{width:10px;height:10px;stroke-width:3}

  /* responsiveness */
  @media (max-width: 1280px){
    .jar-grid{grid-template-columns:repeat(3,1fr)}
    .ill-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media (max-width: 980px){
    .app{grid-template-columns:1fr}
    .sidebar{display:none}
    .stat-grid{grid-template-columns:1fr}
    .lower{grid-template-columns:1fr}
    .jar-grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
