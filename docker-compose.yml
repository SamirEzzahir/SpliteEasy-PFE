# SplitEasy full stack: Postgres + FastAPI backend + Next.js frontend.
#
#   docker compose up --build
#
# Then open http://localhost:3000  (API proxied via the web container to backend).
# Override credentials/secrets in a root .env file (see .env.example).

services:
  db:
    build: ./postgres
    image: spliteasy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB: ${POSTGRES_DB:-spliteasy_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      # Backend waits for this to pass before starting (see depends_on below).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-spliteasy_db}"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    image: spliteasy-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-spliteasy_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      # Auto-load the demo dataset (login: demo / demo) on first startup.
      # Idempotent: only seeds once, then no-ops. Set to 0 to disable.
      SEED_DEMO: ${SEED_DEMO:-1}
    depends_on:
      db:
        condition: service_healthy
    # Published on the host as BACKEND_PORT (default 8000); the container always
    # listens on 8000 internally. Note: the local dev workflow runs uvicorn on
    # 8800 instead — see the root README "Installation" vs "Docker" sections.
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  web:
    build:
      context: ./splitea-nextjs
      args:
        # Next.js rewrites /api/* → backend are baked at BUILD time, so the proxy
        # target must be passed as a build arg (a runtime env var is too late).
        BACKEND_PROXY_TARGET: http://backend:8000
    image: spliteasy-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
