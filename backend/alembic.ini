# Alembic configuration for the SplitEasy backend.
# Run from the backend/ folder (local) or /app (container). The database URL is
# NOT stored here — env.py reads it from app.core.config.settings.DATABASE_URL.

[alembic]
script_location = alembic
# Put the project root (backend/) on sys.path so `import app.*` works.
prepend_sys_path = .
# Timestamped, slug-friendly revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
version_path_separator = os

# ── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
