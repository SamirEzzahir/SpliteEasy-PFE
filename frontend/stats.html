<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Expenses</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">


  <!-- ✅ Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>
  <!-- ✅ Mobile Navbar -->
  <div id="navbarMobile" class="d-md-none"></div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">SplitEasy - Statistics</a>
      <a href="groups.html" class="btn btn-outline-light btn-sm">Back</a>
    </div>
  </nav>
  <div class="container my-4">
    <!-- Filters -->
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h5 class="card-title">📅 Filter by Date</h5>
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label for="fromDate" class="form-label">From:</label>
            <input type="date" id="fromDate" class="form-control" />
          </div>
          <div class="col-md-4">
            <label for="toDate" class="form-label">To:</label>
            <input type="date" id="toDate" class="form-control" />
          </div>
          <div class="col-md-4">
            <button id="applyFilter" class="btn btn-primary w-100">Apply</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Global Stats -->
    <div class="row">
      <div class="col-md-4">
        <div class="card text-center shadow-sm mb-4">
          <div class="card-body">
            <h6>Total Expenses</h6>
            <h3 id="totalExpenses" class="fw-bold text-success">0.00</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- Expenses by Group -->
    <div class="card mb-4 shadow-sm">
      <div class="card-body">
        <h5 class="card-title">🏘️ Expenses per Group</h5>
        <table class="table table-striped" id="groupTable">
          <thead>
            <tr>
              <th>Group</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>




    <!-- Daily Chart -->
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title">📊 Daily Expenses</h5>
        <canvas id="dailyChart" height="100"></canvas>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/stats.js"></script>
    <script src="js/navbar.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
