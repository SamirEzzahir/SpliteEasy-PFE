<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card p-4" style="width:100%;max-width:460px;border-radius:12px">
    <h3>Create Account</h3>
    <input id="username" class="form-control my-2" placeholder="Username">
    <input id="email" class="form-control my-2" placeholder="Email" type="email">
    <div class="input-group my-2">
      <input id="password" class="form-control" placeholder="Password" type="password">
      <button class="btn btn-outline-secondary" type="button" onclick="const p=document.getElementById('password'); p.type = p.type==='password'?'text':'password'"><i class="bi bi-eye"></i></button>
    </div>
    <button class="btn btn-primary w-100" onclick="registerUser()">Register</button>
    <div class="mt-3 text-center"><a href="login.html">Already have an account? Login</a></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
 if (localStorage.getItem("token")) window.location.href = "home.html";
 </script>
</body>
</html>
