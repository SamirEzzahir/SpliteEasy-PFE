<!-- frontend\groups.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split App - Groups</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>

<body>

  <!-- ✅ Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>
  <!-- ✅ Mobile Navbar -->
  <div id="navbarMobile" class="d-md-none"></div>




  <!-- Desktop Groups Table -->
  <div class="container mt-5 d-none d-md-block">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2><i class="bi bi-people"></i> My Groups</h2>
      <div>
        <button class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#createGroupModal">
          <i class="bi bi-plus-circle"></i> Create Group
        </button>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addExpenseModal">
          <i class="bi bi-plus-circle"></i> Add Expense
        </button>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <table class="table table-hover align-middle text-center">
          <thead class="table-dark">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Currency</th>
              <th>Owner</th>
              <th>Members</th>
              <th>Created At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="groupsTable">
            <!-- Groups injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Mobile Groups -->
  <div class="d-md-none mt-4">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Groups</h4>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#createGroupModal">
          <i class="bi bi-plus-circle"></i> Create Group
        </button>
      </div>

      <div class="container my-3" id="groupsMobileCards">
        <!-- Groups will be injected here by JS -->
      </div>


      <!-- Floating Add Expense Button -->
      <button class="btn btn-success   position-fixed"
        style="bottom: 4.5rem; right: 1rem;  height: 55px;" data-bs-toggle="modal"
        data-bs-target="#addExpenseModal">
        <i class="bi bi-receipt"> Add Expense</i>
      </button>
    </div>
  </div>

  <!-- Modals -->
  <!-- Create Group Modal -->
  <div class="modal fade" id="createGroupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content shadow">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title"><i class="bi bi-plus-circle"></i> Create Group</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="createGroupForm">
            <div class="mb-3">
              <label for="groupTitle" class="form-label">Group Title</label>
              <input type="text" class="form-control" id="groupTitle" placeholder="e.g. Trip to Paris" required>
            </div>
            <div class="mb-3">
              <label for="groupCurrency" class="form-label">Currency</label>
              <select class="form-select" id="groupCurrency" required>
                <option value="MAD">MAD (Dirham)</option>
                <option value="$">USD ($)</option>
                <option value="EUR">EUR (€)</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="groupType" class="form-label">Type</label>
              <select class="form-select" id="groupType" required>
                <option value="Home">Home</option>
                <option value="Couple">Couple</option>
                <option value="Trip">Trip</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Select Members</label>
              <div id="friendsTable" class="border rounded p-2" style="max-height: 200px; overflow-y: auto;">
                <!-- Friends checkboxes injected here -->
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" onclick="createGroup()">Create</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Expense Modal -->
  <div class="modal fade" id="addExpenseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content shadow-lg">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-cash-stack"></i> Add Expense</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Select Group</label>
            <select id="groupsListForExpenses" class="form-select">
              <option value="">-- Select a group --</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" id="expenseDesc" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Amount</label>
            <input type="number" step="0.01" class="form-control" id="expenseAmount" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Select Members</label>
            <div id="membersListForGroups" class="border rounded p-2" style="max-height: 200px; overflow-y: auto;">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-success" onclick="addExpenseModalSubmit()">Save Expense</button>
        </div>
      </div>

    </div>

  </div>


  <!-- Scripts -->
  <script src="js/config.js" defer></script>
  <script src="js/navbar.js" defer></script>
  <script src="js/group.js" defer></script>
  <script src="js/expenses.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (!localStorage.getItem("token")) window.location.href = "login.html";
  </script>

</body>

</html>
