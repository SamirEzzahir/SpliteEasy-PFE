<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SplitApp - Overview</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

  <!-- Desktop Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>




  <!-- ✅ Desktop Groups Table (hidden on mobile, visible on md+) -->
  <!-- ✅ Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>



<main class="container my-5">
  <h2 class="mb-4 text-center"><i class="bi bi-bar-chart-line"></i> Global Expenses Overview</h2>

  <div class="row g-4">

    <!-- Filters -->
    <div class="col-12 mb-3">
      <div class="d-flex gap-3 flex-wrap">
        <div>
          <label>User</label>
          <select id="userSelect" class="form-select"></select>
        </div>
        <div>
          <label>Time Range</label>
          <select id="timeRange" class="form-select">
            <option value="daily">Daily</option>
            <option value="monthly" selected>Monthly</option>
            <option value="yearly">Yearly</option>
            <option value="lifetime">Lifetime</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Grouped Bar Chart: Users per Group -->
    <div class="col-md-12">
      <div class="card shadow">
        <div class="card-header">Expenses by Group (Per User)</div>
        <div class="card-body">
          <canvas id="overviewGroupChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Line Chart: Expenses over Time -->
    <div class="col-md-12">
      <div class="card shadow">
        <div class="card-header">Expenses Over Time</div>
        <div class="card-body">
          <canvas id="overviewDateChart"></canvas>
        </div>
      </div>
    </div>

  </div>
</main>


  <!-- Mobile navbar -->
            <div id="navbarMobile" class="d-md-none"></div>
    </div>
  </div>


<script>

</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/config.js"></script>
<script src="js/navbar.js"></script>
<script src="js/stats.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
 if (!localStorage.getItem("token")) window.location.href = "login.html";
 </script>
</body>
</html>
