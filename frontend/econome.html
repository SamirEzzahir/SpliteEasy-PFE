<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitEasy - ÉCONOMÉ</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/friends.css" rel="stylesheet">
</head>

<body>
  <!-- Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>
  <div id="navbarMobile" class="d-md-none"></div>

  <div class="container-fluid py-4">
    <div class="container">
      <h2 class="text-center mb-4">💼 ÉCONOMÉ Dashboard</h2>

      <div class="card shadow-lg p-4">
        <form id="economeForm">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Monthly Income (MAD)</label>
              <input type="number" step="0.01" name="income" id="income" class="form-control" placeholder="Enter your income" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">System Type</label>
              <select name="system" id="system" class="form-select"></select>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-calculator"></i> Calculate
          </button>
        </form>
      </div>

      <div id="resultBox" class="mt-5 d-none">
        <h4 class="mb-3 text-center">📊 Distribution Result</h4>
        <div class="table-responsive">
          <table class="table table-striped table-hover text-center">
            <thead class="table-light">
              <tr>
                <th>Account</th>
                <th>Amount (MAD)</th>
              </tr>
            </thead>
            <tbody id="resultBody"></tbody>
            <tfoot class="fw-bold table-light">
              <tr>
                <td>Total</td>
                <td id="totalCell"></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="js/config.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/econome.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
