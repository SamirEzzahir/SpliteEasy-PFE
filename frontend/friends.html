<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Friends - SplitEasy</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
#toastContainer { position: fixed; top: 1rem; right: 1rem; z-index: 1055; }
</style>
</head>
<body>
  <!-- ✅ Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>
    <!-- ✅ Mobile Navbar -->
  <div id="navbarMobile" class="d-md-none"></div>


<div class="container my-4">
  <h3>Friends</h3>
  <!-- Search -->
  <div class="input-group mb-3">
    <input id="friendSearch" class="form-control" placeholder="Search by username or email">
    <button id="friendSearchBtn" class="btn btn-primary">Search</button>
  </div>

  <!-- Search results -->
  <ul id="searchResults" class="list-group mb-3"></ul>

  <div class="row">
    <!-- My friends -->
    <div class="col-md-6">
      <h5>My Friends</h5>
      <ul id="myFriends" class="list-group mb-3"></ul>
    </div>

    <!-- Requests -->
    <div class="col-md-6">
      <h5>Requests Received</h5>
      <ul id="requestsReceived" class="list-group mb-3"></ul>
      <h5 class="mt-3">Requests Sent</h5>
      <ul id="requestsSent" class="list-group mb-3"></ul>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>



<script src="js/config.js"></script>
<script src="js/friends.js"></script>
<script src="js/navbar.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
 if (!localStorage.getItem("token")) window.location.href = "login.html";
 </script>
</body>
</html>
