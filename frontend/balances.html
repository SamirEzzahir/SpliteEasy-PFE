<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Balances</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
  <style>
    .balance-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .balance-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <!-- ✅ Navbar -->
  <div id="navbar" class="d-none d-md-block"></div>
  <!-- ✅ Mobile Navbar -->
  <div id="navbarMobile" class="d-md-none"></div>

  <div class="container mt-4">
    <h2>📊 Group Balances</h2>

    <div class="d-flex justify-content-between mb-3">
      <button class="btn btn-primary" id="routerToExpenses">Go to Expenses</button>
      <button class="btn btn-outline-success" id="recordBtn">Record Settlement</button>
    </div>

    <!-- ✅ Balances Cards -->
    <div class="card mb-3 shadow-sm">
      <div class="card-header bg-light">💰 Balances</div>
      <div class="card-body">
        <div id="balancesCards" class="row g-3 justify-content-center">
          <div class="text-center text-muted">Loading...</div>
        </div>
      </div>
    </div>

    <!-- ✅ Suggested Settlements -->
    <div class="card mb-3 shadow-sm">
      <div class="card-header bg-light">🤝 Suggested Settlements</div>
      <div class="card-body">
        <table class="table table-bordered" id="settlementsTable">
          <thead><tr><th>From</th><th>To</th><th>Amount (MAD)</th></tr></thead>
          <tbody><tr><td colspan="3" class="text-center text-muted">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- ✅ Settlement History -->
    <div class="card mb-3 shadow-sm">
      <div class="card-header bg-light">📜 Settlement History</div>
      <div class="card-body">
        <table class="table table-striped" id="historyTable">
          <thead><tr><th>From</th><th>To</th><th>Amount (MAD)</th><th>Date</th></tr></thead>
          <tbody><tr><td colspan="4" class="text-center text-muted">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ✅ Record Settlement Modal -->
  <div class="modal fade" id="recordSettlementModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content rounded-3 shadow">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">Record Settlement</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="settlementForm">
            <div class="mb-3">
              <label for="toUserSelect" class="form-label">Settle with</label>
              <select class="form-select" id="toUserSelect" required></select>
            </div>
            <div class="mb-3">
              <label for="settleAmount" class="form-label">Amount</label>
              <input type="number" class="form-control" id="settleAmount" min="0.01" step="0.01" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Record Settlement</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/balance.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
