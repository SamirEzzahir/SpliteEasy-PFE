<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<style>
  .card {
    transition: all 0.3s ease;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
  }

  #profilePhoto:hover {
    transform: scale(1.05);
    transition: transform 0.2s ease;
  }
</style>

</head>

<body class="bg-light">

    <!-- ✅ Navbar -->
    <div id="navbar" class="d-none d-md-block"></div>
    <!-- ✅ Mobile Navbar -->
    <div id="navbarMobile" class="d-md-none"></div>



    <div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">
        <!-- Account header -->
      <div class="text-center mt-4">
        <h2 class="fw-bold"><i class="bi bi-person-circle text-primary"></i> My Account</h2>
        <p class="text-muted">Manage your personal info and security</p>
      </div>
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
        <div class="card-body p-4 d-flex flex-column flex-md-row align-items-center bg-light">
          <!-- Profile Picture -->
          <div class="position-relative">
            <img id="profilePhoto" src="https://via.placeholder.com/100"
              class="rounded-circle border border-3 border-primary shadow-sm me-md-4 mb-3 mb-md-0" width="100" height="100">
          </div>

          <!-- User Info -->
          <div class="flex-grow-1 text-center text-md-start">
            <h4 class="fw-bold mb-1" id="profileName">Loading...</h4>
            <p class="text-muted mb-1" id="profileEmail">email@example.com</p>
            <p class="text-muted small mb-2" id="profilePhone">+212 600 000 000</p>
          </div>

          <!-- Action Buttons -->
          <div class="d-flex flex-column align-items-center align-items-md-end">
            <button class="btn btn-outline-primary btn-sm mb-2 px-4"
              data-bs-toggle="modal" data-bs-target="#editProfileModal">
              <i class="bi bi-pencil-square"></i> Edit Profile
            </button>
            <button class="btn btn-outline-danger btn-sm px-4" id="logoutBtnAccount">
              <i class="bi bi-box-arrow-right"></i> Logout
            </button>
          </div>
        </div>
      </div>

      
      
    </div>
  </div>
</div>


<div class="container mt-4">
  <h4 class="mb-3"><i class="bi bi-clock-history"></i> Recent Activity</h4>
  <ul class="list-group" id="activityList"></ul>
</div>


    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content shadow-lg">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="modalAccountForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" id="modal_username" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="modal_email" class="form-control" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" id="modal_first_name" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" id="modal_last_name" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select id="modal_gender" class="form-select">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" id="modal_phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Profile Photo URL</label>
                            <input type="text" id="modal_profile_photo" class="form-control">
                            <div class="mt-2">
                                <img id="modalPhotoPreview" src="https://via.placeholder.com/80" class="rounded-circle"
                                    width="80" height="80">
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save
                                Changes</button>
                            <button type="button" class="btn btn-danger" id="modalDeleteBtn"><i class="bi bi-trash"></i>
                                Delete Account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>




    <!-- Bootstrap + JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/account.js"></script>
    <script src="js/stats.js"></script>
</body>

</html>
