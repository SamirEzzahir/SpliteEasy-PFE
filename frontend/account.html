<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    
<style>
        /* Modern Account Page Styles */
        .account-hero {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 3rem 0;
            margin-bottom: 2rem;
        }
        
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 2rem;
            color: white;
            text-align: center;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
  }

        .profile-avatar:hover {
            transform: scale(1.05);
        }
        
        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 1.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: none;
        }
        
        .stats-card:hover {
    transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .action-btn {
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .activity-item {
            border: none;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            padding: 1rem;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .activity-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 15px 15px 0 0;
            margin-bottom: 0;
        }
        
        .modal-content {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .modal-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
        }
        
        .btn-close-white {
            filter: invert(1);
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 0.2rem rgba(79, 172, 254, 0.25);
        }
        
        .activity-modal .modal-dialog {
            max-width: 600px;
        }
        
        .activity-timeline {
            position: relative;
            padding-left: 2rem;
        }
        
        .activity-timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, #4facfe, #00f2fe);
        }
        
        .activity-timeline-item {
            position: relative;
            margin-bottom: 1.5rem;
            padding-left: 2rem;
        }
        
        .activity-timeline-item::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 8px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #4facfe;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
</style>
</head>

<body class="bg-light">
    <!-- ✅ Navbar -->
    <div id="navbar" class="d-none d-md-block"></div>
    <!-- ✅ Mobile Navbar -->
    <div id="navbarMobile" class="d-md-none"></div>

    <!-- Hero Section -->
    <div class="account-hero">
        <div class="container">
  <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <h1 class="display-4 fw-bold mb-3">
                        <i class="bi bi-person-circle me-3"></i>My Account
                    </h1>
                    <p class="lead mb-0">Manage your profile, settings, and activity</p>
                </div>
            </div>
      </div>
          </div>

    <div class="container">
        <!-- Profile Card -->
        <div class="row justify-content-center mb-5">
            <div class="col-lg-8">
                <div class="profile-card">
                    <div class="profile-header">
                        <img id="profilePhoto" src="https://ui-avatars.com/api/?name=User&background=random&color=fff&size=120" class="profile-avatar mb-3" alt="Profile">
                        <h3 class="fw-bold mb-2" id="profileName">Loading...</h3>
                        <p class="mb-1" id="profileEmail">email@example.com</p>
                        <p class="mb-0" id="profilePhone">+212 600 000 000</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <button class="btn btn-primary action-btn w-100" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                                    <i class="bi bi-pencil-square me-2"></i>Edit Profile
                                </button>
                            </div>
                            <div class="col-md-6 mb-3">
                                <button class="btn btn-outline-primary action-btn w-100" data-bs-toggle="modal" data-bs-target="#activityModal">
                                    <i class="bi bi-clock-history me-2"></i>View Activity
                                </button>
                            </div>
          </div>
                        <div class="row">
                            <div class="col-md-6">
                                <button class="btn btn-outline-success action-btn w-100" onclick="window.location.href='income.html'">
                                    <i class="bi bi-wallet2 me-2"></i>Income & Wallets
            </button>
                            </div>
                            <div class="col-md-6">
                                <button class="btn btn-outline-danger action-btn w-100" id="logoutBtnAccount">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


        <!-- Recent Activity Preview -->
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm">
                    <div class="section-header">
                        <h5 class="mb-0">
                            <i class="bi bi-clock-history me-2"></i>Recent Activity
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <div id="activityPreview" class="p-3">
                            <div class="text-center text-muted py-4">
                                <div class="loading-spinner mx-auto mb-2"></div>
                                <p class="mb-0">Loading recent activity...</p>
                            </div>
                        </div>
                        <div class="text-center p-3 border-top">
                            <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#activityModal">
                                <i class="bi bi-eye me-2"></i>View All Activity
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
</div>


    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-square me-2"></i>Edit Profile
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="modalAccountForm">
                        <!-- Profile Photo Section -->
                        <div class="text-center mb-4">
                            <img id="modalPhotoPreview" src="https://ui-avatars.com/api/?name=User&background=random&color=fff&size=100" class="rounded-circle border border-3 border-primary" width="100" height="100" alt="Profile Preview">
                            <div class="mt-2">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-image me-1"></i>Profile Photo URL
                                </label>
                                <input type="url" id="modal_profile_photo" class="form-control" placeholder="https://example.com/photo.jpg">
                                <div class="form-text">Enter a valid image URL</div>
                            </div>
                        </div>

                        <!-- Basic Information -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">
                                    <i class="bi bi-info-circle me-1"></i>Basic Information
                                </h6>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person me-1"></i>Username *
                                </label>
                                <input type="text" id="modal_username" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-envelope me-1"></i>Email *
                                </label>
                                <input type="email" id="modal_email" class="form-control" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person-badge me-1"></i>First Name
                                </label>
                                <input type="text" id="modal_first_name" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-person-badge me-1"></i>Last Name
                                </label>
                                <input type="text" id="modal_last_name" class="form-control">
                            </div>
                        </div>

                        <!-- Additional Information -->
                        <div class="row mb-4">
                            <div class="col-12">
                                <h6 class="text-primary mb-3">
                                    <i class="bi bi-gear me-1"></i>Additional Information
                                </h6>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-gender-ambiguous me-1"></i>Gender
                                </label>
                            <select id="modal_gender" class="form-select">
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                            </select>
                        </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    <i class="bi bi-telephone me-1"></i>Phone
                                </label>
                                <input type="tel" id="modal_phone" class="form-control" placeholder="+212 600 000 000">
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex justify-content-between mt-4">
                            <button type="button" class="btn btn-outline-danger" id="modalDeleteBtn">
                                <i class="bi bi-trash me-1"></i>Delete Account
                            </button>
                            <div>
                                <button type="button" class="btn btn-outline-secondary me-2" data-bs-dismiss="modal">
                                    <i class="bi bi-x-circle me-1"></i>Cancel
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save me-1"></i>Save Changes
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Activity Modal -->
    <div class="modal fade activity-modal" id="activityModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-clock-history me-2"></i>Recent Activity
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="activityModalContent">
                        <div class="text-center text-muted py-4">
                            <div class="loading-spinner mx-auto mb-2"></div>
                            <p class="mb-0">Loading activity...</p>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle me-1"></i>Close
                    </button>
                </div>
            </div>
        </div>
    </div>




    <!-- Bootstrap + JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/account.js"></script>
</body>

</html>
